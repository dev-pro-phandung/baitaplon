version: '3.8'

services:
  web:
    build: .
    container_name: minimart_web
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: minimart_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: minimart_db
    ports:
      - "3306:3306"
    volumes:
      - ./database:/docker-entrypoint-initdb.d